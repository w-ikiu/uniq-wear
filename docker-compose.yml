version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uniqwear_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uniqwear_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uniqwear_pass}
      POSTGRES_DB: ${POSTGRES_DB:-uniqwear_db}
    # wymog t8a: healthcheck dla postgresa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniqwear_user} -d ${POSTGRES_DB:-uniqwear_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    container_name: uniqwear_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    # wymog t8a: healthcheck dla mongo
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  # wymog t8b: mikroserwis 1 (katalog)
  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: catalog_service
    ports:
      - "3001:3001"
    environment:
      - CATALOG_PORT=3001
      - DATABASE_URL=postgresql://uniqwear_user:uniqwear_pass@postgres:5432/uniqwear_db?schema=public
      - MONGO_URI=mongodb://mongo:27017/uniqwear_mongo
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  # wymog t8b: mikroserwis 2 (koszyk/zamowienia)
  checkout-service:
    build:
      context: ./checkout-service
      dockerfile: Dockerfile
    container_name: checkout_service
    ports:
      - "3002:3002"
    environment:
      - CHECKOUT_PORT=3002
      - DATABASE_URL=postgresql://uniqwear_user:uniqwear_pass@postgres:5432/uniqwear_db
      - MONGO_URI=mongodb://mongo:27017/uniqwear_mongo
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy