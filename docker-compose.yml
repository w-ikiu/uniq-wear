version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uniqwear_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uniqwear_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uniqwear_pass}
      POSTGRES_DB: ${POSTGRES_DB:-uniqwear_db}
    # wymog t8a: healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniqwear_user} -d ${POSTGRES_DB:-uniqwear_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    container_name: uniqwear_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    # wymog t8a: healthcheck dla mongo
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

# w przyszlosci dodamy tu nasze 3 serwisy node.js, 
# ktore uzyja 'depends_on: condition: service_healthy'