version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uniqwear_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uniqwear_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uniqwear_pass}
      POSTGRES_DB: ${POSTGRES_DB:-uniqwear_db}
    volumes:
      # skrypt init.sql tworzy baze keycloak_db przy pierwszym starcie postgresa
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniqwear_user} -d ${POSTGRES_DB:-uniqwear_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # authorization server — keycloak z postgres jako baza danych
  # realm uniqwear jest importowany automatycznie z pliku realm-export.json
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: uniqwear_keycloak
    # start-dev = tryb deweloperski (bez https, szczegolowe logi)
    # --import-realm = importuje realm z katalogu /opt/keycloak/data/import jesli nie istnieje
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER:-uniqwear_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-uniqwear_pass}
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
    volumes:
      # realm-export.json zostanie zaladowany przy starcie keycloaka
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # sprawdza czy port 8080 jest otwarty — keycloak startuje ok. 60s
      # exec 3<>/dev/tcp to czyste bash bez potrzeby curl/wget
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  mongo:
    image: mongo:latest
    container_name: uniqwear_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  # t8b: mikroserwis 1 (katalog)
  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: catalog_service
    ports:
      - "3001:3001"
    environment:
      - CATALOG_PORT=3001
      - DATABASE_URL=postgresql://uniqwear_user:uniqwear_pass@postgres:5432/uniqwear_db?schema=public
      - MONGO_URI=mongodb://mongo:27017/uniqwear_mongo
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  # t8b: mikroserwis 2 (koszyk/zamowienia)
  checkout-service:
    build:
      context: ./checkout-service
      dockerfile: Dockerfile
    container_name: checkout_service
    ports:
      - "3002:3002"
    environment:
      - CHECKOUT_PORT=3002
      - DATABASE_URL=postgresql://uniqwear_user:uniqwear_pass@postgres:5432/uniqwear_db
      - MONGO_URI=mongodb://mongo:27017/uniqwear_mongo
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  # t8b: api gateway - pojedynczy punkt wejscia dla wszystkich serwisow
  # gateway rowniez waliduje tokeny jwt przed przekazaniem ruchu do serwisow
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: uniqwear_gateway
    ports:
      - "3000:3000"
    environment:
      - GATEWAY_PORT=3000
      - CATALOG_URL=http://catalog_service:3001
      - CHECKOUT_URL=http://checkout_service:3002
      # adres keycloaka wewnatrz sieci docker — uzywany do pobierania kluczy publicznych jwks
      - KEYCLOAK_URL=http://uniqwear_keycloak:8080
      - KEYCLOAK_REALM=uniqwear
    depends_on:
      catalog-service:
        condition: service_started
      checkout-service:
        condition: service_started
      keycloak:
        condition: service_started