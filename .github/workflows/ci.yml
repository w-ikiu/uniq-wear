name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: uniqwear_user
          POSTGRES_PASSWORD: uniqwear_pass
          POSTGRES_DB: uniqwear_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uniqwear_user -d uniqwear_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: install deps and run migrations
      env:
        DATABASE_URL_CATALOG: postgresql://uniqwear_user:uniqwear_pass@localhost:5432/uniqwear_db?schema=public
        DATABASE_URL_CHECKOUT: postgresql://uniqwear_user:uniqwear_pass@localhost:5432/uniqwear_db
        MONGO_URI: mongodb://localhost:27017/uniqwear_mongo
      run: |
        cd catalog-service
        npm ci
        npx prisma generate
        DATABASE_URL=$DATABASE_URL_CATALOG npx prisma migrate deploy
        DATABASE_URL=$DATABASE_URL_CATALOG npx knex migrate:latest
        DATABASE_URL=$DATABASE_URL_CATALOG npx knex seed:run
        cd ../checkout-service
        npm ci
        DATABASE_URL=$DATABASE_URL_CHECKOUT npx sequelize-cli db:migrate

    - name: start servers in background
      run: |
        DATABASE_URL=postgresql://uniqwear_user:uniqwear_pass@localhost:5432/uniqwear_db?schema=public \
        MONGO_URI=mongodb://localhost:27017/uniqwear_mongo \
        CATALOG_PORT=3001 \
        node catalog-service/app.js &

        DATABASE_URL=postgresql://uniqwear_user:uniqwear_pass@localhost:5432/uniqwear_db \
        MONGO_URI=mongodb://localhost:27017/uniqwear_mongo \
        CHECKOUT_PORT=3002 \
        node checkout-service/app.js &

        until curl -sf http://localhost:3001/health; do sleep 1; done
        until curl -sf http://localhost:3002/health; do sleep 1; done

    - name: run catalog tests
      working-directory: ./catalog-service
      run: npm test

    - name: run checkout tests
      working-directory: ./checkout-service
      run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: log in to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: build and push catalog
      uses: docker/build-push-action@v5
      with:
        context: ./catalog-service
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/uniqwear-catalog:latest
          ghcr.io/${{ github.repository_owner }}/uniqwear-catalog:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: build and push checkout
      uses: docker/build-push-action@v5
      with:
        context: ./checkout-service
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/uniqwear-checkout:latest
          ghcr.io/${{ github.repository_owner }}/uniqwear-checkout:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: build and push gateway
      uses: docker/build-push-action@v5
      with:
        context: ./gateway
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/uniqwear-gateway:latest
          ghcr.io/${{ github.repository_owner }}/uniqwear-gateway:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
    - uses: actions/checkout@v4

    - name: create kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: uniqwear

    - name: log in to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: pull and load images into kind
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/uniqwear-catalog:${{ github.sha }}
        docker pull ghcr.io/${{ github.repository_owner }}/uniqwear-checkout:${{ github.sha }}
        docker pull ghcr.io/${{ github.repository_owner }}/uniqwear-gateway:${{ github.sha }}
        kind load docker-image ghcr.io/${{ github.repository_owner }}/uniqwear-catalog:${{ github.sha }} --name uniqwear
        kind load docker-image ghcr.io/${{ github.repository_owner }}/uniqwear-checkout:${{ github.sha }} --name uniqwear
        kind load docker-image ghcr.io/${{ github.repository_owner }}/uniqwear-gateway:${{ github.sha }} --name uniqwear

    - name: apply base manifests
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secret.yaml
        kubectl apply -f k8s/postgres-statefulset.yaml
        kubectl apply -f k8s/mongo-statefulset.yaml
        kubectl apply -f k8s/services.yaml

    - name: wait for databases
      run: |
        kubectl wait --for=condition=ready pod -l app=postgres -n uniqwear --timeout=120s
        kubectl wait --for=condition=ready pod -l app=mongo -n uniqwear --timeout=120s

    - name: patch image tags and deploy apps
      run: |
        sed -i "s/:latest/:${{ github.sha }}/g" \
          k8s/catalog-deployment.yaml \
          k8s/checkout-deployment.yaml \
          k8s/gateway-deployment.yaml
        kubectl apply -f k8s/catalog-deployment.yaml
        kubectl apply -f k8s/checkout-deployment.yaml
        kubectl apply -f k8s/gateway-deployment.yaml
        kubectl apply -f k8s/ingress.yaml

    - name: check rollout status
      run: |
        kubectl rollout status deployment/catalog-service -n uniqwear --timeout=300s
        kubectl rollout status deployment/checkout-service -n uniqwear --timeout=300s
        kubectl rollout status deployment/gateway -n uniqwear --timeout=300s

    - name: debug on failure
      if: failure()
      run: |
        kubectl get pods -n uniqwear
        kubectl describe pods -n uniqwear
        kubectl logs -l app=catalog-service -n uniqwear --all-containers --tail=50 || true
        kubectl logs -l app=checkout-service -n uniqwear --all-containers --tail=50 || true
        kubectl logs -l app=postgres -n uniqwear --tail=20 || true
