apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: uniqwear
spec:
# repliki
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  strategy:
  # rolling update
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: catalog-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      # init container
      initContainers:
      - name: migrate
        image: ghcr.io/w-ikiu/uniqwear-catalog:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
        - |
          node -e "
            const net = require('net');
            function check() {
              const s = net.createConnection(5432, 'postgres');
              s.on('connect', () => { console.log('postgres ready'); s.destroy(); process.exit(0); });
              s.on('error', () => { console.log('waiting for postgres...'); setTimeout(check, 3000); });
            }
            check();
          "
          PRISMA_OUT=$(npx prisma migrate deploy 2>&1)
          echo "$PRISMA_OUT"
          if echo "$PRISMA_OUT" | grep -q "P3005"; then
            echo "schema not empty, syncing with db push..."
            npx prisma db push --accept-data-loss --skip-generate
          elif echo "$PRISMA_OUT" | grep -q "Error:"; then
            exit 1
          fi
          npx knex migrate:latest
          npx knex seed:run || true
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: uniqwear-secret
              key: DATABASE_URL_CATALOG
      # glowny kontener
      containers:
      - name: catalog-service
        image: ghcr.io/w-ikiu/uniqwear-catalog:latest
        imagePullPolicy: IfNotPresent
        command: ["node", "app.js"]
        ports:
        - containerPort: 3001
        # zmienne srodowiskowe
        env:
        - name: CATALOG_PORT
          valueFrom:
            configMapKeyRef:
              name: uniqwear-config
              key: CATALOG_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: uniqwear-secret
              key: DATABASE_URL_CATALOG
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: uniqwear-secret
              key: MONGO_URI
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: uniqwear-config
              key: REDIS_URL
        # readiness probe - czy jest gotowy
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        # liveness probe - czy "zyje"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 90
          periodSeconds: 15
          failureThreshold: 3
        # resources
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # security context
        securityContext:
          # non root
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
