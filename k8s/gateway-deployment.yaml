apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: uniqwear
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/w-ikiu/uniqwear-gateway:latest
        ports:
        - containerPort: 3000
        env:
        - name: GATEWAY_PORT
          valueFrom:
            configMapKeyRef:
              name: uniqwear-config
              key: GATEWAY_PORT
        - name: CATALOG_URL
          valueFrom:
            configMapKeyRef:
              name: uniqwear-config
              key: CATALOG_URL
        - name: CHECKOUT_URL
          valueFrom:
            configMapKeyRef:
              name: uniqwear-config
              key: CHECKOUT_URL
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
