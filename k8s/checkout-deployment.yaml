apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: uniqwear
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: checkout-service
    spec:
      initContainers:
      - name: migrate
        image: ghcr.io/w-ikiu/uniqwear-checkout:latest
        command: ["sh", "-c"]
        args:
        - |
          until nc -w1 postgres 5432 </dev/null 2>/dev/null; do
            echo "waiting for postgres..."; sleep 3
          done
          npx sequelize-cli db:migrate
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: uniqwear-secret
              key: DATABASE_URL_CHECKOUT
      containers:
      - name: checkout-service
        image: ghcr.io/w-ikiu/uniqwear-checkout:latest
        command: ["node", "app.js"]
        ports:
        - containerPort: 3002
        env:
        - name: CHECKOUT_PORT
          valueFrom:
            configMapKeyRef:
              name: uniqwear-config
              key: CHECKOUT_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: uniqwear-secret
              key: DATABASE_URL_CHECKOUT
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: uniqwear-secret
              key: MONGO_URI
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
